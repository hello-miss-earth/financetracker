<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com; style-src 'self' 'unsafe-inline';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Finance Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #f5f6fa; min-height: 100vh; }

    /* ── RESPONSIVE LAYOUT ── */
    #app { min-height: 100vh; }

    /* Phone: single column, bottom nav */
    #layout {
      display: flex; min-height: 100vh;
    }
    #sidebar {
      display: none;
    }
    #main-content {
      flex: 1; padding-bottom: 80px; min-width: 0;
    }
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; z-index: 50;
      border-top: 1px solid #e2e8f0; background: white;
    }
    .nav-btn {
      flex: 1; padding: 10px 0 12px; background: none; border: none;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
    }

    /* Tablet (768px+): wider card, centered */
    @media (min-width: 768px) {
      #main-content { max-width: 600px; margin: 0 auto; padding-bottom: 80px; }
      .card { padding: 18px 20px; }
    }

    /* Desktop (1024px+): sidebar nav + content side by side */
    @media (min-width: 1024px) {
      #layout { flex-direction: row; }
      #sidebar {
        display: flex; flex-direction: column;
        width: 220px; min-height: 100vh;
        padding: 24px 16px; gap: 8px;
        position: sticky; top: 0; height: 100vh;
        border-right: 1px solid #e2e8f0;
        background: white;
      }
      #sidebar-logo {
        font-size: 13px; font-weight: 700; letter-spacing: 2px;
        text-transform: uppercase; color: #94a3b8; margin-bottom: 16px; padding: 0 8px;
      }
      .sidebar-btn {
        display: flex; align-items: center; gap: 12px;
        padding: 10px 12px; border-radius: 10px; border: none;
        background: none; cursor: pointer; font-family: inherit;
        font-size: 14px; font-weight: 600; color: #64748b;
        text-align: left; width: 100%;
      }
      .sidebar-btn:hover { background: #f1f5f9; }
      .sidebar-btn.active { background: #0f172a; color: white; }
      .sidebar-btn .sb-emoji { font-size: 18px; }
      .nav { display: none; }
      #main-content {
        flex: 1; max-width: 680px; padding-bottom: 40px;
        margin: 0 auto;
      }
      /* Hide mobile header settings button on desktop — use sidebar */
    }

    /* Large desktop (1280px+): more breathing room */
    @media (min-width: 1280px) {
      #sidebar { width: 260px; padding: 32px 20px; }
      #main-content { max-width: 720px; }
    }

    input:focus { outline: none; }
    button { font-family: inherit; }
    input { font-family: inherit; }
    select { font-family: inherit; }

    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 999; width: calc(100% - 32px); max-width: 440px;
      pointer-events: none; transition: opacity 0.3s;
    }
    .toast-inner {
      background: white; border-radius: 16px; padding: 14px 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      display: flex; align-items: center; gap: 12px;
    }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 900; display: flex; align-items: center;
      justify-content: center; padding: 24px;
    }
    .modal-box {
      background: white; border-radius: 20px; padding: 28px 24px;
      width: 100%; max-width: 340px; text-align: center;
    }
    .card {
      background: white; border-radius: 14px; padding: 14px 16px;
      margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .section-label {
      font-weight: 700; font-size: 13px; color: #64748b;
      letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px;
    }
    .firebase-notice {
      background: #fff8e1; border: 1px solid #ffd54f; border-radius: 10px;
      padding: 10px 14px; margin-bottom: 12px; font-size: 12px; color: #795548;
    }
    /* Tablet/desktop: allocation grid 2 cols */
    @media (min-width: 768px) {
      #allocation-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      #allocation-grid > * { margin-bottom: 0 !important; }
    }
    @media (min-width: 1024px) {
      #allocation-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div id="app"></div>
<script type="module">
// ─────────────────────────────────────────────
// 🔥 PASTE YOUR FIREBASE CONFIG HERE
// Go to console.firebase.google.com
// Project Settings → Your apps → Web app → SDK setup & config
// ─────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const FIREBASE_USER_ID = "default_user"; // Change to your name e.g. "john"

// ─────────────────────────────────────────────
// STORAGE LAYER — localStorage primary, Firebase optional
// Firebase only loads if you fill in FIREBASE_CONFIG above
// ─────────────────────────────────────────────
let db = null;
let firebaseReady = false;

async function initFirebase() {
  if (FIREBASE_CONFIG.apiKey === "YOUR_API_KEY") return;
  try {
    // Dynamically load Firebase only if configured
    const [{ initializeApp }, { getFirestore, doc, getDoc, setDoc, deleteDoc }] = await Promise.all([
      import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"),
      import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js")
    ]);
    const app = initializeApp(FIREBASE_CONFIG);
    db = getFirestore(app);
    firebaseReady = true;
    window._fbDoc = (key) => doc(db, "users", FIREBASE_USER_ID, "data", key);
    window._fbSetDoc = setDoc;
    window._fbGetDoc = getDoc;
    window._fbDelDoc = deleteDoc;
    console.log("Firebase connected!");
  } catch(e) {
    console.warn("Firebase failed to load, using localStorage only:", e);
    firebaseReady = false;
  }
}

function lsSet(key, value) { try { localStorage.setItem(key, JSON.stringify(value)); } catch {} }
function lsGet(key, fallback) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } }
function lsDel(key) { try { localStorage.removeItem(key); } catch {} }

async function storeSave(key, value) {
  lsSet(key, value);
  if (firebaseReady) {
    try { await window._fbSetDoc(window._fbDoc(key), { value: JSON.stringify(value) }); }
    catch(e) { console.warn("Firebase save failed:", e); }
  }
}

async function storeLoad(key, fallback) {
  if (firebaseReady) {
    try {
      const snap = await window._fbGetDoc(window._fbDoc(key));
      if (snap.exists()) {
        const val = JSON.parse(snap.data().value);
        lsSet(key, val);
        return val;
      }
    } catch(e) { console.warn("Firebase load failed, using localStorage:", e); }
  }
  return lsGet(key, fallback);
}

async function storeDelete(key) {
  lsDel(key);
  if (firebaseReady) {
    try { await window._fbDelDoc(window._fbDoc(key)); } catch {}
  }
}

// ─────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const PALETTE = [
  { color: "#1a3a5c", light: "#e8f0f8" },
  { color: "#007aff", light: "#e5f1ff" },
  { color: "#00a86b", light: "#e0f7ee" },
  { color: "#7c3aed", light: "#f0ebff" },
  { color: "#e05c00", light: "#fff0e5" },
  { color: "#db2777", light: "#fce7f3" },
  { color: "#0891b2", light: "#e0f7fa" },
  { color: "#b45309", light: "#fef3c7" },
];
const EMOJIS = ["\u{1F3E6}","\u{1F4B3}","\u{1F6D2}","\u{1F331}","\u{1F4C8}","\u2728","\u{1F6E1}\uFE0F","\u{1F4B0}","\u{1F3AF}","\u{1F3E0}","\u2708\uFE0F","\u{1F393}","\u{1F48A}","\u{1F3AE}","\u{1F457}","\u{1F354}"];
const EMOJI_LABELS = ["\uD83C\uDFE6","\uD83D\uDCB3","\uD83D\uDED2","\uD83C\uDF31","\uD83D\uDCC8","\u2728","\uD83D\uDEE1\uFE0F","\uD83D\uDCB0","\uD83C\uDFAF","\uD83C\uDFE0","\u2708\uFE0F","\uD83C\uDF93","\uD83D\uDC8A","\uD83C\uDFAE","\uD83D\uDC57","\uD83C\uDF54"];
const EMOJI_LIST = ["🏦","💳","🛒","🌱","📈","✨","🛡️","💰","🎯","🏠","✈️","🎓","💊","🎮","👗","🍔"];
const THEMES = [
  { id:"dark",   label:"Default", header:"#0f172a", headerText:"#ffffff", accent:"#0f172a", bg:"#f5f6fa", navBg:"#ffffff", navBorder:"#e2e8f0" },
  { id:"blue",   label:"Blue",    header:"#bfdbfe", headerText:"#1e3a5f", accent:"#3b82f6", bg:"#eff6ff", navBg:"#dbeafe", navBorder:"#bfdbfe" },
  { id:"pink",   label:"Pink",    header:"#fce7f3", headerText:"#831843", accent:"#ec4899", bg:"#fdf2f8", navBg:"#fce7f3", navBorder:"#fbcfe8" },
  { id:"purple", label:"Purple",  header:"#ede9fe", headerText:"#4c1d95", accent:"#7c3aed", bg:"#f5f3ff", navBg:"#ede9fe", navBorder:"#ddd6fe" },
  { id:"yellow", label:"Yellow",  header:"#fef9c3", headerText:"#713f12", accent:"#ca8a04", bg:"#fefce8", navBg:"#fef9c3", navBorder:"#fde68a" },
  { id:"red",    label:"Red",     header:"#fee2e2", headerText:"#7f1d1d", accent:"#ef4444", bg:"#fff5f5", navBg:"#fee2e2", navBorder:"#fecaca" },
  { id:"mint",   label:"Mint",    header:"#d1fae5", headerText:"#064e3b", accent:"#10b981", bg:"#f0fdf4", navBg:"#d1fae5", navBorder:"#a7f3d0" },
];
const DEFAULT_ACCOUNTS = [
  { id:"bdo",      name:"BDO",       purpose:"Emergency Fund", emoji:"🛡️", paletteIdx:0 },
  { id:"gcash",    name:"GCash",     purpose:"Daily Needs",    emoji:"🛒", paletteIdx:1 },
  { id:"maya",     name:"Maya",      purpose:"Savings",        emoji:"🌱", paletteIdx:2 },
  { id:"dragonfi", name:"Dragonfi",  purpose:"Investment",     emoji:"📈", paletteIdx:3 },
  { id:"maribank", name:"Mari Bank", purpose:"Daily Wants",    emoji:"✨", paletteIdx:4 },
];
const DEFAULT_PCT = { bdo:10, gcash:35, maya:20, dragonfi:15, maribank:20 };

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function formatPeso(n) {
  return "₱" + Number(n||0).toLocaleString("en-PH",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function mkMonthKey(year, month) {
  return year + "-" + String(month+1).padStart(2,"0");
}
function genId() { return Math.random().toString(36).slice(2,9); }
function fmtDate(iso) {
  const d = new Date(iso);
  return MONTHS[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear();
}
function getPal(idx) { return PALETTE[idx % PALETTE.length]; }
function getTheme(id) { return THEMES.find(t=>t.id===id)||THEMES[0]; }

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const [k,v] of Object.entries(attrs)) {
      if (k === "style" && typeof v === "object") {
        for (const [sk,sv] of Object.entries(v)) e.style[sk] = sv;
      } else if (k.startsWith("on") && typeof v === "function") {
        e.addEventListener(k.slice(2).toLowerCase(), v);
      } else if (k === "cls") {
        e.className = v;
      } else {
        e.setAttribute(k, v);
      }
    }
  }
  for (const c of children) {
    if (c == null || c === false || c === "") continue;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return e;
}

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const now = new Date();
const S = {
  tab: "home",
  month: now.getMonth(),
  year: now.getFullYear(),
  selectedAccId: null,
  accounts: DEFAULT_ACCOUNTS,
  percentages: DEFAULT_PCT,
  incomeLog: {},
  balances: {},
  txHistory: {},
  themeId: "dark",
  incomeLabel: "",
  incomeAmount: "",
  incomeSource: "Work",
  openDepositId: null,
  depositAmount: "",
  depositedSession: {},
  showReset: false,
  tempAccounts: [],
  tempPct: {},
  addingAccount: false,
  newAcc: { name:"", purpose:"", emoji:"🏦", paletteIdx:0 },
  editingId: null,
  loading: true,
};

// ─────────────────────────────────────────────
// DERIVED
// ─────────────────────────────────────────────
function monthKey() { return mkMonthKey(S.year, S.month); }
function entries()  { return S.incomeLog[monthKey()] || []; }
function grossIncome()    { return entries().reduce((s,e)=>s+e.amount,0); }
function totalDeposited() { return Object.values(S.depositedSession).reduce((s,v)=>s+v,0); }
function remaining()      { return Math.max(0, grossIncome()-totalDeposited()); }
function netWorth()       { return S.accounts.reduce((s,a)=>s+(S.balances[a.id]||0),0); }
function isNow()          { return S.month===now.getMonth()&&S.year===now.getFullYear(); }
function totalTempPct()   { return Object.values(S.tempPct).reduce((s,v)=>s+Number(v||0),0); }

// ─────────────────────────────────────────────
// SAVE
// ─────────────────────────────────────────────
function saveAccounts()    { storeSave("fd_accounts",    S.accounts); }
function savePercentages() { storeSave("fd_percentages", S.percentages); }
function saveIncome()      { storeSave("fd_income",      S.incomeLog); }
function saveBalances()    { storeSave("fd_balances",    S.balances); }
function saveTxHistory()   { storeSave("fd_txhistory",   S.txHistory); }
function saveTheme()       { storeSave("fd_theme",       S.themeId); }

// ─────────────────────────────────────────────
// LOAD
// ─────────────────────────────────────────────
async function loadAll() {
  try {
    await initFirebase();
    S.accounts    = await storeLoad("fd_accounts",    DEFAULT_ACCOUNTS);
    S.percentages = await storeLoad("fd_percentages", DEFAULT_PCT);
    S.incomeLog   = await storeLoad("fd_income",      {});
    S.balances    = await storeLoad("fd_balances",    {});
    S.txHistory   = await storeLoad("fd_txhistory",   {});
    S.themeId     = await storeLoad("fd_theme",       "dark");
  } catch(e) {
    console.warn("Load error, falling back to defaults:", e);
    S.accounts    = lsGet("fd_accounts",    DEFAULT_ACCOUNTS);
    S.percentages = lsGet("fd_percentages", DEFAULT_PCT);
    S.incomeLog   = lsGet("fd_income",      {});
    S.balances    = lsGet("fd_balances",    {});
    S.txHistory   = lsGet("fd_txhistory",   {});
    S.themeId     = lsGet("fd_theme",       "dark");
  }
  S.loading = false;
  render();
}

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
let toastTimer = null;
function showToast(acc, amt) {
  clearTimeout(toastTimer);
  const p = getPal(acc.paletteIdx);
  const box = document.getElementById("toast-box");
  box.style.display = "block";
  box.innerHTML = "";
  box.appendChild(
    el("div", { cls:"toast-inner", style:{ border:"2px solid "+p.color } },
      el("div", { style:{ width:"40px",height:"40px",borderRadius:"11px",background:p.light,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",flexShrink:"0" } }, acc.emoji),
      el("div", {},
        el("div", { style:{ fontWeight:"800",fontSize:"14px",color:"#0f172a" } }, "Deposited successfully! ✓"),
        el("div", { style:{ fontSize:"13px",color:"#64748b",marginTop:"2px" } },
          el("span", { style:{ fontWeight:"700",color:p.color } }, formatPeso(amt)),
          " added to " + acc.name
        )
      )
    )
  );
  toastTimer = setTimeout(() => { box.style.display="none"; }, 3000);
}

// ─────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────
function addIncome() {
  const amt = parseFloat(S.incomeAmount);
  if (!amt||amt<=0) return;
  const mk = monthKey();
  const entry = { id:Date.now(), label:S.incomeLabel||S.incomeSource, source:S.incomeSource, amount:amt, date:new Date().toISOString() };
  S.incomeLog[mk] = [...(S.incomeLog[mk]||[]), entry];
  S.incomeLabel=""; S.incomeAmount=""; S.depositedSession={};
  saveIncome(); render();
}

function removeIncome(id) {
  const mk = monthKey();
  S.incomeLog[mk] = (S.incomeLog[mk]||[]).filter(e=>e.id!==id);
  S.depositedSession={};
  saveIncome(); render();
}

function openDeposit(acc) {
  const pct = S.percentages[acc.id]||0;
  const suggested = parseFloat((grossIncome()*(pct/100)).toFixed(2));
  const done = S.depositedSession[acc.id]||0;
  S.openDepositId = acc.id;
  S.depositAmount = String(Math.max(0, suggested-done));
  render();
}

function confirmDeposit(acc) {
  const amt = parseFloat(S.depositAmount);
  if (!amt||amt<=0) return;
  const label = "Income deposit — " + MONTHS[S.month] + " " + S.year;
  const date = new Date().toISOString();
  S.balances[acc.id] = (S.balances[acc.id]||0) + amt;
  S.txHistory[acc.id] = [{ id:genId(),amount:amt,label,date,type:"deposit" }, ...(S.txHistory[acc.id]||[])];
  S.depositedSession[acc.id] = (S.depositedSession[acc.id]||0) + amt;
  S.openDepositId=null; S.depositAmount="";
  saveBalances(); saveTxHistory();
  showToast(acc, amt);
  render();
}

function resetSession() {
  S.depositedSession={}; S.openDepositId=null; S.depositAmount="";
  const mk = monthKey();
  S.incomeLog[mk] = [];
  saveIncome(); render();
}

function prevMonth() {
  S.depositedSession={}; S.openDepositId=null;
  if (S.month===0) { S.month=11; S.year--; } else S.month--;
  render();
}
function nextMonth() {
  if (isNow()) return;
  S.depositedSession={}; S.openDepositId=null;
  if (S.month===11) { S.month=0; S.year++; } else S.month++;
  render();
}

function doReset() {
  S.accounts=DEFAULT_ACCOUNTS; S.percentages=DEFAULT_PCT;
  S.incomeLog={}; S.balances={}; S.txHistory={};
  S.themeId="dark"; S.depositedSession={};
  S.showReset=false; S.tab="home";
  ["fd_accounts","fd_percentages","fd_income","fd_balances","fd_txhistory","fd_theme"].forEach(k=>storeDelete(k));
  render();
}

function openSettings() {
  S.tempAccounts = S.accounts.map(a=>Object.assign({},a));
  S.tempPct = {};
  S.accounts.forEach(a=>{ S.tempPct[a.id]=S.percentages[a.id]||0; });
  S.addingAccount=false; S.editingId=null;
  S.tab="settings"; render();
}

function saveSettings() {
  if (totalTempPct()!==100) return;
  S.accounts = S.tempAccounts.slice();
  S.percentages = Object.assign({}, S.tempPct);
  S.tab="home";
  saveAccounts(); savePercentages(); render();
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  const theme = getTheme(S.themeId);
  document.body.style.background = theme.bg;
  app.style.background = theme.bg;
  app.innerHTML = "";

  // Toast
  const toastBox = el("div", { id:"toast-box", cls:"toast", style:{ display:"none" } });
  app.appendChild(toastBox);

  if (S.loading) {
    app.appendChild(el("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontSize:"14px",color:"#94a3b8"}},"Loading..."));
    return;
  }

  // Reset modal
  if (S.showReset) {
    app.appendChild(
      el("div", { cls:"modal-overlay", onclick:()=>{ S.showReset=false; render(); } },
        el("div", { cls:"modal-box", onclick:(e)=>e.stopPropagation() },
          el("div",{style:{fontSize:"40px",marginBottom:"12px"}},"🔄"),
          el("div",{style:{fontWeight:"800",fontSize:"18px",marginBottom:"8px"}},"Reset Everything?"),
          el("div",{style:{fontSize:"14px",color:"#64748b",marginBottom:"24px",lineHeight:"1.6"}},
            "This will delete all accounts, balances, income, and settings. Cannot be undone."
          ),
          el("div",{style:{display:"flex",gap:"10px"}},
            el("button",{style:{flex:"1",padding:"13px",background:"#f1f5f9",border:"none",borderRadius:"12px",fontWeight:"600",fontSize:"14px",cursor:"pointer",color:"#64748b"},onclick:()=>{ S.showReset=false; render(); }},"Cancel"),
            el("button",{style:{flex:"1",padding:"13px",background:"#ef4444",border:"none",borderRadius:"12px",fontWeight:"700",fontSize:"14px",cursor:"pointer",color:"white"},onclick:doReset},"Yes, Reset")
          )
        )
      )
    );
  }

  // Build responsive layout wrapper
  const layout = el("div", { id:"layout" });
  app.appendChild(layout);

  // ── SIDEBAR (desktop only, shown via CSS) ──
  const theme2 = getTheme(S.themeId);
  const sidebar = el("div", { id:"sidebar", style:{ background: theme2.navBg, borderRight:"1px solid "+theme2.navBorder } },
    el("div", { id:"sidebar-logo" }, "💰 Finance"),
    ...["home","accounts","settings"].map((tid,i)=>{
      const labels=["Dashboard","My Accounts","Settings"]; const emojis=["🏠","💳","⚙️"];
      const isAct = S.tab===tid;
      return el("button", {
        cls: "sidebar-btn" + (isAct?" active":""),
        style: isAct?{ background:theme2.accent, color:"white" }:{},
        onclick:()=>{ if(tid==="settings") openSettings(); else { S.tab=tid; render(); } }
      },
        el("span",{ cls:"sb-emoji" }, emojis[i]),
        labels[i]
      );
    })
  );
  layout.appendChild(sidebar);

  // Main content wrapper
  const mainWrap = el("div", { id:"main-content" });
  layout.appendChild(mainWrap);

  // Account detail
  if (S.selectedAccId) {
    const acc = S.accounts.find(a=>a.id===S.selectedAccId);
    if (acc) {

          S.addingAccount=false; render();
        }},"Add Account"),
        el("button",{style:{background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:"8px",padding:"9px 14px",fontSize:"13px",cursor:"pointer"},onclick:()=>{ S.addingAccount=false; render(); }},"Cancel")
      ));
      content.appendChild(newCard);
    } else {
      content.appendChild(el("button",{style:{width:"100%",padding:"12px",background:"white",color:"#0f172a",border:"1.5px dashed #cbd5e1",borderRadius:"12px",fontWeight:"600",fontSize:"14px",cursor:"pointer",marginBottom:"10px"},onclick:()=>{ S.addingAccount=true; render(); }},"+ Add Account"));
    }

    const tp=totalTempPct();
    content.appendChild(el("div",{style:{textAlign:"center",marginTop:"4px",marginBottom:"14px"}},
      el("span",{style:{fontWeight:"700",fontSize:"15px",color:tp===100?"#00a86b":"#e05c00"}},"Total: "+tp+"% "+(tp===100?"✓":tp<100?"("+(100-tp)+"% remaining)":"("+(tp-100)+"% over)"))
    ));
    content.appendChild(el("button",{
      style:{width:"100%",padding:"14px",background:tp===100?theme.accent:"#cbd5e1",color:"white",border:"none",borderRadius:"12px",fontWeight:"700",fontSize:"15px",cursor:tp===100?"pointer":"default"},
      onclick:saveSettings
    },"Save"));

    // Theme picker
    content.appendChild(el("div",{style:{marginTop:"28px"}},
      el("div",{cls:"section-label"},"App Color Theme"),
      el("div",{style:{display:"flex",flexWrap:"wrap",gap:"8px"}},
        ...THEMES.map(t=>el("button",{
          style:{padding:"8px 14px",borderRadius:"10px",border:S.themeId===t.id?"2.5px solid "+t.accent:"2px solid #e2e8f0",background:t.header,cursor:"pointer",fontWeight:S.themeId===t.id?700:500,fontSize:"13px",color:t.headerText},
          onclick:()=>{ S.themeId=t.id; saveTheme(); render(); }
        },(S.themeId===t.id?"✓ ":"")+t.label))
      )
    ));

    // Danger zone
    content.appendChild(el("div",{style:{marginTop:"32px",borderTop:"1px solid #fee2e2",paddingTop:"20px",marginBottom:"20px"}},
      el("div",{style:{fontWeight:"700",fontSize:"13px",color:"#ef4444",letterSpacing:"1px",textTransform:"uppercase",marginBottom:"8px"}},"Danger Zone"),
      el("div",{style:{fontSize:"13px",color:"#94a3b8",marginBottom:"12px"}},"Wipe all data and start completely fresh."),
      el("button",{style:{width:"100%",padding:"13px",background:"white",border:"2px solid #ef4444",borderRadius:"12px",fontWeight:"700",fontSize:"14px",cursor:"pointer",color:"#ef4444"},onclick:()=>{ S.showReset=true; render(); }},"🔄 Reset All Data")
    ));
    mainWrap.appendChild(content);
  }

  // Nav
  mainWrap.appendChild(
    el("div",{cls:"nav",style:{background:theme.navBg,borderTop:"1px solid "+theme.navBorder}},
      ...["home","accounts"].map((tid,i)=>{
        const labels=["Home","Accounts"]; const emojis=["🏠","💳"];
        const isAct=S.tab===tid;
        const btn=el("button",{cls:"nav-btn",onclick:()=>{ S.tab=tid; render(); }},
          el("span",{style:{fontSize:"22px"}},emojis[i]),
          el("span",{style:{fontSize:"11px",fontWeight:isAct?"700":"400",color:isAct?theme.accent:"#94a3b8"}},labels[i])
        );
        if(isAct) btn.appendChild(el("div",{style:{width:"20px",height:"3px",background:theme.accent,borderRadius:"99px"}}));
        return btn;
      })
    )
  );
}

// ─────────────────────────────────────────────
// START
// ─────────────────────────────────────────────
loadAll();
</script>
